environment: "development"

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  
logging:
  level: "INFO"
  format: "json"
  output: "stdout"
  
monitoring:
  enable_metrics: true
  enable_drift_detection: true
  metrics_port: 9090
  
model:
  path: "models/anomaly_detector.pkl"
  cache_enabled: true
  warmup_on_start: true
