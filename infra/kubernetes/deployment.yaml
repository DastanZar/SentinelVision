apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelvision-inference
  labels:
    app: sentinelvision
    component: inference
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinelvision
      component: inference
  template:
    metadata:
      labels:
        app: sentinelvision
        component: inference
    spec:
      containers:
      - name: inference
        image: sentinelvision/inference:latest
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: "/app/models/anomaly_detector.pkl"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelvision-inference-service
spec:
  selector:
    app: sentinelvision
    component: inference
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
